<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sayarti-school | المنصة الذكية</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-body: #f4f7f6; --text-color: #2c3e50; --card-bg: #ffffff; }
        [data-theme="dark"] { --bg-body: #1a1a1a; --text-color: #f4f7f6; --card-bg: #2d2d2d; }

        body { background-color: var(--bg-body); color: var(--text-color); transition: 0.3s; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: var(--card-bg); color: var(--text-color); border: none; }
        
        /* شريط البحث */
        .search-box { border-radius: 20px; border: 1px solid #ddd; padding: 5px 20px; }
        
        /* وضع التصفح الليلي */
        .theme-toggle { cursor: pointer; font-size: 1.2rem; }
        
        /* Google Translate - إخفاء الشريط العلوي المزعج */
        .goog-te-banner-frame { display: none !important; }
        #google_translate_element { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🚗 sayarti-school</a>
            
            <div class="d-flex align-items-center gap-3">
                <input type="text" id="searchInput" class="form-control form-control-sm search-box d-none d-md-block" placeholder="ابحث عن درس..." onkeyup="searchLessons()">
                
                <div id="google_translate_element"></div>

                <div class="theme-toggle text-warning" onclick="toggleTheme()">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </div>

                <button class="btn btn-sm btn-outline-light" data-bs-toggle="modal" data-bs-target="#loginModal" id="userBtn">
                    <i class="fas fa-user-circle"></i> دخول
                </button>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row" id="content-area">
            <div class="col-lg-12 text-center mb-5">
                <h1 class="display-5">مرحباً بك في منصة Mubarak التعليمية</h1>
                <p class="lead">تعلم القيادة بكل لغات العالم وبأحدث التقنيات.</p>
            </div>

            <div class="col-md-4 lesson-item" data-title="إشارات المرور">
                <div class="card shadow-sm p-4 mb-4 text-center">
                    <i class="fas fa-traffic-light fa-3x mb-3"></i>
                    <h4>إشارات المرور</h4>
                    <button class="btn btn-primary btn-sm">ابدأ الآن</button>
                </div>
            </div>
            <div class="col-md-4 lesson-item" data-title="ميكانيكا المحرك">
                <div class="card shadow-sm p-4 mb-4 text-center">
                    <i class="fas fa-engine-warning fa-3x mb-3 text-warning"></i>
                    <h4>ميكانيكا المحرك</h4>
                    <button class="btn btn-primary btn-sm">ابدأ الآن</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="color: #333;">
                <div class="modal-header">
                    <h5 class="modal-title">إنشاء حساب / دخول</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="userNameInput" class="form-control mb-3" placeholder="اسم المستخدم">
                    <input type="password" class="form-control mb-3" placeholder="كلمة المرور">
                    <button class="btn btn-success w-100" onclick="login()">دخول للمتابعة</button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ar', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // 2. نظام الوضع الليلي
        function toggleTheme() {
            const html = document.getElementById('main-html');
            const icon = document.getElementById('theme-icon');
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        }

        // 3. نظام البحث البسيط
        function searchLessons() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let lessons = document.getElementsByClassName('lesson-item');
            
            for (let i = 0; i < lessons.length; i++) {
                let title = lessons[i].getAttribute('data-title').toLowerCase();
                lessons[i].style.display = title.includes(input) ? "block" : "none";
            }
        }

        // 4. محاكاة تسجيل الدخول (Session Management)
        function login() {
            const user = document.getElementById('userNameInput').value;
            if(user) {
                localStorage.setItem('activeUser', user);
                document.getElementById('userBtn').innerText = `أهلاً، ${user}`;
                bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
                alert(`مرحباً بك يا ${user} في sayarti-school`);
            }
        }

        // تحميل الإعدادات المحفوظة
        window.onload = () => {
            if(localStorage.getItem('theme') === 'dark') toggleTheme();
            const savedUser = localStorage.getItem('activeUser');
            if(savedUser) document.getElementById('userBtn').innerText = `أهلاً، ${savedUser}`;
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
